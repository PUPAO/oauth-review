<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>

<h2>로그인 성공 🎉</h2>

<hr>

<h3>리뷰 작성</h3>

<form id="reviewForm">
    <input type="text" name="title" placeholder="제목 입력" required>
    <input type="text" name="comment" placeholder="리뷰를 입력하세요" required>
    <button type="submit">작성</button>
</form>

<p id="result"></p>

<hr>

<h3>내 리뷰 목록</h3>

<button onclick="loadReviews()">리뷰 불러오기</button>

<ul id="reviewList"></ul>

<hr>

<form th:action="@{/logout}" method="post">
    <button type="submit">로그아웃</button>
</form>

<script>

    const token = document.querySelector('meta[name="_csrf"]').content;
    const header = document.querySelector('meta[name="_csrf_header"]').content;

    // =============================
    // 리뷰 작성
    // =============================
    document.getElementById("reviewForm").addEventListener("submit", function (e) {
        e.preventDefault();

        const title = this.title.value.trim();
        const comment = this.comment.value.trim();

        if (!title || !comment) {
            alert("제목과 내용을 입력하세요.");
            return;
        }

        fetch("/review", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                [header]: token
            },
            body: new URLSearchParams({ title, comment })
        })
            .then(res => res.text())
            .then(data => {
                document.getElementById("result").innerText = data;
                this.reset();
                loadReviews();
            });
    });

    // =============================
    // 리뷰 조회
    // =============================
    function loadReviews() {
        fetch("/review", {
            headers: {
                [header]: token
            }
        })
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById("reviewList");
                list.innerHTML = "";

                data.forEach(review => {
                    const li = document.createElement("li");

                    li.innerHTML = `
                        <strong id="title-${review.id}">${review.title}</strong> -
                        <span id="comment-${review.id}">${review.comment}</span>
                        <button onclick="editReview(${review.id})">수정</button>
                        <button onclick="deleteReview(${review.id})">삭제</button>
                    `;

                    list.appendChild(li);
                });
            })
            .catch(err => console.error("리뷰 로딩 오류:", err));
    }

    // =============================
    // 리뷰 수정
    // =============================
    function editReview(id) {

        const titleElement = document.getElementById(`title-${id}`);
        const commentElement = document.getElementById(`comment-${id}`);

        if (!titleElement || !commentElement) {
            console.error("DOM 요소를 찾을 수 없습니다.");
            return;
        }

        const currentTitle = titleElement.innerText;
        const currentComment = commentElement.innerText;

        const newTitle = prompt("수정할 제목을 입력하세요:", currentTitle);
        if (newTitle === null) return;

        const newComment = prompt("수정할 내용을 입력하세요:", currentComment);
        if (newComment === null) return;

        fetch(`/review/${id}`, {
            method: "PATCH",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                [header]: token
            },
            body: new URLSearchParams({
                title: newTitle.trim(),
                comment: newComment.trim()
            })
        })
            .then(res => res.text())
            .then(() => loadReviews())
            .catch(err => console.error("수정 오류:", err));
    }

    // =============================
    // 리뷰 삭제
    // =============================
    function deleteReview(id) {

        if (!confirm("정말 삭제하시겠습니까?")) return;

        fetch(`/review/${id}`, {
            method: "DELETE",
            headers: {
                [header]: token
            }
        })
            .then(res => res.text())
            .then(() => loadReviews())
            .catch(err => console.error("삭제 오류:", err));
    }

</script>

</body>
</html>
